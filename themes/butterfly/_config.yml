# --------------------------------------
# Hexo Butterfly Theme Configuration
# Hexo Butterfly 主题配置文件
# 官方文档: https://butterfly.js.org/
# --------------------------------------

# --------------------------------------
# Navigation Settings
# 导航栏设置 - 这里可以改，改了会影响网站顶部导航的显示
# --------------------------------------

nav:
  # 导航栏 Logo 图片路径
  # 可以改成自己的 logo 图片，放在 themes/butterfly/source/img/ 目录下
  # 例如: /img/logo.png
  logo:
  
  # 在导航栏显示网站标题
  # true = 显示 | false = 不显示
  display_title: true
  
  # 查看文章时在导航栏显示文章标题
  # true = 显示 | false = 不显示
  display_post_title: true
  
  # 滚动页面时是否固定导航栏在顶部
  # true = 固定 | false = 不固定
  fixed: true

menu:
  # 导航菜单配置
  # 格式: 菜单名: 链接 || 图标
  # 可以添加、删除或修改菜单项
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  分类: /categories/ || fas fa-folder-open
  标签: /tags/ || fas fa-tags

# --------------------------------------
# Code Blocks Settings
# 代码块设置 - 这里可以改，改了会影响代码显示效果
# --------------------------------------

code_blocks:
  # 代码块主题配色
  # 可选: darker / pale night / light / ocean / false
  # 改了会改变代码块的颜色风格
  theme: light
  
  # 启用 macOS 风格的窗口按钮
  # true = 显示三个小圆点 | false = 不显示
  macStyle: false
  
  # 代码块高度限制（单位：像素）
  # false = 不限制 | 填数字如 500 = 超过500px显示滚动条
  height_limit: false
  
  # 是否启用代码自动换行
  # true = 换行 | false = 不换行（横向滚动）
  word_wrap: false

  # 工具栏设置
  # 显示复制按钮
  copy: true
  # 显示代码语言
  language: true
  # 代码块默认状态
  # true = 折叠 | false = 展开 | none = 展开并隐藏按钮
  shrink: false
  # 启用代码块全屏按钮
  fullpage: false

# Social media links
# 社交媒体链接 - 这里可以改，添加自己的社交账号
# 格式: 图标: 链接 || 描述文字 || 颜色
social:
  fab fa-github: https://github.com/oldplum || GitHub || '#24292e'
  fas fa-envelope: mailto:oldplum@outlook.com || 邮箱 || '#4a7dbe'
  # 可添加多个，取消前面的 # 注释即可启用

# --------------------------------------
# Image Settings
# 图片设置 - 这里可以改，改了会影响网站的各种图片显示
# --------------------------------------

# 网站图标
# 推荐用 32x32 或 64x64 的 png 图片
# 放在 themes/butterfly/source/img/ 目录下
favicon: /img/avatar.png

avatar:
  # 头像图片路径
  # 可以换成自己的头像
  img: /img/avatar.jpg
  # 鼠标悬停时头像旋转效果
  # true = 旋转 | false = 不旋转
  effect: true

# 禁用所有顶部横幅图片
# true = 禁用 | false = 启用（显示横幅）
disable_top_img: false

# 如果页面横幅未设置，将显示默认横幅
# 可以设置一个默认的横幅图片路径
default_top_img: /img/index_img.jpg

# 首页顶部横幅图片
index_img: /img/index_img.jpg

# 归档页顶部横幅图片
archive_img:

# 单个标签页的横幅图片（不是标签列表页）
tag_img:

# 为每个标签单独设置横幅图片
# 格式:
#   - 标签名: 图片路径
tag_per_img:

# 单个分类页的横幅图片（不是分类列表页）
category_img:

# 为每个分类单独设置横幅图片
# 格式:
#   - 分类名: 图片路径
category_per_img:

# 页脚背景图片
# false = 不使用 | 填路径 = 使用图片
footer_img: /img/foot.jpg

# 网站背景
# 可以设置颜色、图片链接，或者颜色和图片的数组
# 如果是数组，每次加载页面会随机选择一个
background: /img/background.jpg

cover:
  # 文章封面相关设置
  # 在首页显示封面
  index_enable: true
  # 在侧边栏显示封面
  aside_enable: true
  # 在归档页显示封面
  archives_enable: true
  # 当文章未设置封面时，显示默认封面
  # 可以添加多个图片，格式:
  #   - /img/cover1.jpg
  #   - /img/cover2.jpg
  default_cover:

# 加载失败时显示的替换图片
error_img:
  # 友链加载失败时显示的图片
  flink: /img/friend_404.gif
  # 文章封面加载失败时显示的图片
  post_page: /img/404.jpg

# 简单的 404 页面
error_404:
  # 启用自定义 404 页面
  enable: false
  # 404 页面的副标题文字
  subtitle: 'Page Not Found'
  # 404 页面背景图片
  background: /img/error-page.png

post_meta:
  # 首页文章元信息设置
  page:
    # 日期显示类型
    # created = 显示创建时间 | updated = 显示更新时间 | both = 都显示
    date_type: created
    # 日期显示格式
    # date = 标准日期格式 | relative = 相对时间（如：3天前）
    date_format: date
    # 显示分类
    categories: true
    # 显示标签
    tags: false
    # 显示标签文字前缀（如：分类：标签：）
    label: true
  # 文章页元信息设置
  post:
    # 元信息位置
    # left = 左对齐 | center = 居中
    position: left
    # 日期显示类型
    date_type: both
    # 日期显示格式
    date_format: date
    # 显示分类
    categories: true
    # 显示标签
    tags: true
    # 显示标签文字前缀
    label: true

# --------------------------------------
# Index page settings
# 首页设置 - 这里可以改，改了会影响首页的显示效果
# --------------------------------------

# 首页顶部横幅设置
# 默认：横幅全屏，网站信息居中
# 网站信息位置，例如: 300px/300em/300rem/10%
index_site_info_top:
# 顶部横幅高度，例如: 300px/300em/300rem
index_top_img_height:

# 首页副标题
subtitle:
  # 启用副标题
  enable: true
  # 打字机效果
  effect: true
  # 自定义 typed.js 配置（需要懂 JavaScript）
  typed_option:
  # 副标题来源（仅中文）
  # false = 禁用 | 1 = hitokoto.cn | 2 = https://api.aa1.cn/doc/yiyan.html | 3 = jinrishici.com
  source: false
  # 如果关闭打字机效果，副标题只显示第一行
  sub: "迎一片春来，等一场花开"

# 首页文章布局
# 1 = 封面在左，信息在右
# 2 = 封面在右，信息在左
# 3 = 封面和信息左右交替（推荐）
# 4 = 封面在上，信息在下
# 5 = 信息显示在封面上
# 6 = 瀑布流布局 - 封面在上，信息在下
# 7 = 瀑布流布局 - 信息显示在封面上
index_layout: 3

# 首页文章摘要显示
# 1 = 只显示文章 front-matter 中的 description
# 2 = 两者都用（如果有 description 就显示，否则显示自动摘要）
# 3 = 自动摘要（默认）
# false = 不显示文章摘要
index_post_content:
  method: 3
  # 如果方法是 2 或 3，需要配置摘要长度（字符数）
  length: 500

# --------------------------------------
# Post Settings
# 文章页设置 - 这里可以改，改了会影响文章详情页的显示
# --------------------------------------

toc:
  # 在文章页显示目录
  post: true
  # 在普通页面显示目录
  page: false
  # 在目录中显示编号
  number: true
  # 自动展开所有目录项
  expand: false
  # 仅文章页使用简洁目录样式
  style_simple: false
  # 在目录中显示滚动进度
  scroll_percent: true

post_copyright:
  # 启用文章版权信息
  # true = 在文章末尾显示版权信息 | false = 不显示
  enable: true
  # 解密版权信息（防盗用，需要配合主题特殊设置）
  decode: false
  # 作者链接
  author_href:
  # 协议名称
  license: CC BY-NC-SA 4.0
  # 协议链接
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 打赏功能
reward:
  # 启用打赏
  enable: false
  # 打赏说明文字
  text:
  # 二维码图片
  QR_code:
    # - img: /img/wechat.jpg
    #   link:
    #   text: 微信
    # - img: /img/alipay.jpg
    #   link:
    #   text: 支付宝

# 文章编辑按钮
# 方便在线查看和编辑博客源代码
post_edit:
  # 启用编辑按钮
  enable: false
  # 编辑链接模板
  # 例如: https://github.com/用户名/仓库名/edit/分支名/source/
  url:

# 相关文章
related_post:
  # 启用相关文章
  enable: true
  # 显示文章数量
  limit: 6
  # 排序方式
  # created = 按创建时间 | updated = 按更新时间
  date_type: created

# 文章分页导航
# 1 = 下一篇指向旧文章
# 2 = 下一篇指向新文章
# false = 禁用分页
post_pagination: 1

# 文章过期提醒
noticeOutdate:
  # 启用过期提醒
  enable: false
  # 样式
  # simple = 简洁样式 | flat = 扁平样式
  style: flat
  # 多少天后显示提醒（单位：天）
  limit_day: 365
  # 位置
  # top = 文章顶部 | bottom = 文章底部
  position: top
  # 提醒文字前缀
  message_prev: It has been
  # 提醒文字后缀
  message_next: days since the last update, the content of the article may be outdated.

# --------------------------------------
# Footer Settings
# 页脚设置 - 这里可以改，改了会影响网站底部显示
# --------------------------------------
footer:
  # 页脚导航菜单（用法同顶部导航 menu）
  nav:
  owner:
    # 显示博主信息
    enable: true
    # 博客起始年份（如：2024）
    since: 2026
  # 主题和框架版权信息
  copyright:
    # 显示版权信息
    enable: true
    # 显示主题和 Hexo 版本
    version: true
  # 自定义页脚文字（支持 HTML）
  custom_text:

# --------------------------------------
# Aside Settings
# 侧边栏设置 - 这里可以改，改了会影响右侧（或左侧）侧边栏
# --------------------------------------

aside:
  # 启用侧边栏
  enable: true
  # 默认隐藏侧边栏
  hide: false
  # 在右下角显示隐藏侧边栏按钮
  button: true
  # 在移动设备显示侧边栏
  mobile: true
  # 位置
  # left = 左侧 | right = 右侧
  position: right
  # 侧边栏显示的卡片
  display:
    archive: true
    tag: true
    category: true

  # 博主信息卡片
  card_author:
    enable: true
    # 博主简介
    description:
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/oldplum
  # 公告卡片
  card_announcement:
    enable: true
    content: This is my Blog
  # 最新文章卡片
  card_recent_post:
    enable: true
    # 显示数量，0 表示全部显示
    limit: 5
    # 排序
    # date = 按创建时间 | updated = 按更新时间
    sort: date
    sort_order:
  # 最新评论卡片
  card_newest_comments:
    enable: false
    sort_order:
    limit: 6
    # 单位：分钟，将数据保存到 localStorage
    storage: 10
    avatar: true
  # 分类卡片
  card_categories:
    enable: true
    # 显示数量，0 表示全部显示
    limit: 8
    # 展开状态
    # none = 不设置 | true = 展开 | false = 折叠
    expand: none
    sort_order:
  # 标签卡片
  card_tags:
    enable: true
    # 显示数量，0 表示全部显示
    limit: 40
    # 启用彩色标签
    color: false
    custom_colors:
    # 标签排序
    # random = 随机 | name = 名称 | length = 数量
    orderby: random
    # 排序顺序
    # 1 = 升序 | -1 = 降序
    order: 1
    sort_order:
  # 归档卡片
  card_archives:
    enable: true
    # 类型
    # monthly = 按月 | yearly = 按年
    type: monthly
    # 日期格式，例如：YYYY年MM月
    format: MMMM YYYY
    # 排序顺序
    # 1 = 升序 | -1 = 降序
    order: -1
    # 显示数量，0 表示全部显示
    limit: 8
    sort_order:
  # 文章系列卡片
  card_post_series:
    enable: true
    # 标题显示系列名称
    series_title: false
    # 排序方式
    # title = 按标题 | date = 按日期
    orderBy: 'date'
    # 排序顺序
    # 1 = 升序 | -1 = 降序
    order: -1
  # 网站信息卡片
  card_webinfo:
    enable: true
    # 显示文章数量
    post_count: true
    # 显示最后更新时间
    last_push_date: true
    sort_order:
    # 网站运行时间
    # 格式：月/日/年 时间 或 年/月/日 时间
    # 如果不启用此功能请留空
    runtime_date:

# --------------------------------------
# Bottom right button
# 右下角按钮设置 - 这里可以改，改了会影响右下角功能按钮
# --------------------------------------

# 右下角按钮距离底部的距离（默认单位：像素）
rightside_bottom:

# 繁简转换
translate:
  enable: false
  # 按钮显示的文字
  default: 繁
  # 网站默认语言
  # 1 = 繁体 | 2 = 简体
  defaultEncoding: 2
  # 转换延迟时间
  translateDelay: 0
  # 简体状态下按钮文字
  msgToTraditionalChinese: '繁'
  # 繁体状态下按钮文字
  msgToSimplifiedChinese: '簡'

# 阅读模式
# 启用后可以一键进入阅读模式（隐藏侧边栏等）
readmode: true

# 暗色模式
darkmode:
  # 启用暗色模式
  enable: true
  # 显示切换暗色/亮色模式按钮
  button: true
  # 自动切换暗色/亮色模式
  # 1 = 跟随系统设置，如果系统不支持暗色模式，将在晚上 6 点到早上 6 点切换
  # 2 = 在晚上 6 点到早上 6 点切换
  # false = 不自动切换
  autoChangeMode: ture
  # 设置亮色模式时间段，值在 0-24 之间
  # 如果不设置，默认 6 点到 18 点
  start: 6
  end: 18

# 在回到顶部按钮显示滚动百分比
rightside_scroll_percent: false

# 除非你知道它们如何工作，否则不要修改以下设置
# 右下角按钮顺序设置
rightside_item_order:
  enable: false
  # 默认隐藏：readmode,translate,darkmode,hideAside
  hide:
  # 默认显示：toc,chat,comment
  show:

# 右下角设置按钮的动画
rightside_config_animation: true

# --------------------------------------
# Global Settings
# 全局设置 - 这里可以改，根据需要调整
# --------------------------------------

anchor:
  # 滚动时，URL 会根据标题 ID 自动更新
  auto_update: false
  # 点击标题滚动并更新锚点
  click_to_scroll: false

photofigcaption: false

copy:
  enable: true
  # 复制内容后添加版权信息
  copyright:
    enable: false
    limit_count: 150

# 字数统计 - 需要安装 hexo-wordcount 插件
wordcount:
  enable: false
  # 在文章元信息中显示字数
  post_wordcount: true
  # 在文章元信息中显示阅读时间
  min2read: true
  # 在侧边栏网站信息中显示总字数
  total_wordcount: true

# 不蒜子统计网站 PV/UV
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# --------------------------------------
# Math
# 数学公式 - 不需要可以不改
# --------------------------------------

# 关于 per_page
# 如果设为 true，会在每个页面加载 mathjax/katex
# 如果设为 false，只会在需要时加载（在文章 front-matter 中添加 'mathjax: true' 或 'katex: true'）
math:
  # 选择数学公式渲染器
  # mathjax = MathJax | katex = KaTeX
  # 留空表示不使用数学公式
  use:
  per_page: true
  hide_scrollbar: false

  mathjax:
    # 启用右键菜单
    enableMenu: true
    # 公式编号方式
    # all = 全部编号 | ams = AMS 样式 | none = 不编号
    tags: none

  katex:
    # 启用复制 KaTeX 公式功能
    copy_tex: false

# --------------------------------------
# Search
# 搜索 - 不需要可以不改
# --------------------------------------

search:
  # 选择搜索引擎
  # algolia_search = Algolia | local_search = 本地搜索 | docsearch = DocSearch
  # 留空表示不使用搜索
  use:
  placeholder:

  # Algolia Search
  algolia_search:
    # 每页显示的搜索结果数量
    hitsPerPage: 6

  # 本地搜索
  local_search:
    # 页面加载时预加载搜索数据
    preload: false
    # 每篇文章显示前 n 个结果，-1 显示全部
    top_n_per_article: 1
    # 转义 HTML 字符串为可读格式
    unescape: false
    # 启用搜索结果分页
    pagination:
      enable: false
      # 每页显示的搜索结果数量
      hitsPerPage: 8
    CDN:

  # Docsearch
  docsearch:
    appId:
    apiKey:
    indexName:
    option:

# --------------------------------------
# Share System
# 分享系统 - 不需要可以不改
# --------------------------------------

share:
  # 选择分享工具
  # sharejs = Share.js | addtoany = AddToAny
  # 留空表示不使用分享
  use: addtoany

  # Share.js
  sharejs:
    sites: facebook,x,wechat,weibo,qq

  # AddToAny
  addtoany:
    item: facebook,x,wechat,sina_weibo,facebook_messenger,email,copy_link

# --------------------------------------
# Comments System
# 评论系统 - 不需要可以不改，需要时配置
# --------------------------------------

comments:
  # 最多两个评论系统，第一个作为默认显示
  # 可选：Disqus/Disqusjs/Livere/Gitalk/Valine/Waline/Utterances/Facebook Comments/Twikoo/Giscus/Remark42/Artalk
  # 留空表示不使用评论
  use: Giscus
  # 在按钮旁边显示评论系统名称
  text: true
  # 懒加载：评论系统在元素进入可视区域时加载
  # 如果设为 true，评论数将无效
  lazyload: false
  # 在文章顶部横幅显示评论数
  count: false
  # 在首页显示评论数
  card_post_count: false

# 以下是各种评论系统的配置，需要用哪个就配置哪个
# Disqus
disqus:
  shortname:
  apikey:

# DisqusJS
disqusjs:
  shortname:
  apikey:
  option:

# Livere
livere:
  uid:

# Gitalk
gitalk:
  client_id:
  client_secret:
  repo:
  owner:
  admin:
  option:

# Valine
valine:
  appId:
  appKey:
  avatar: monsterid
  serverURLs:
  bg:
  visitor: false
  option:

# Waline
waline:
  serverURL:
  bg:
  pageview: false
  option:

# Utterances
utterances:
  repo:
  issue_term: pathname
