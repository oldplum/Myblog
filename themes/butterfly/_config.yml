# --------------------------------------

# 自定义主题颜色
# 注意：颜色值必须用双引号如 "#000"，否则可能报错！
#
theme_color:
  enable: true
  main: "#224294"
  paginator: "#224294"
  button_hover: "#162C63"
  text_selection: "#224294"
  link_color: "#224294"
  meta_color: "#858585"
  hr_color: "#224294"
  code_foreground: "#224294"
  code_background: "rgba(34, 66, 148, .05)"
  toc_color: "#224294"
  blockquote_padding_color: "#224294"
  blockquote_background_color: "#224294"
  scrollbar_color: "#224294"
  meta_theme_color_light: "224294"
  meta_theme_color_dark: "0d1830"

# 分类和标签页面的 UI 设置
# index = 与首页相同 | default = 与归档页相同
# 留空或 index
category_ui:
tag_ui:

# UI 元素圆角
rounded_corners_ui: true

# 文字两端对齐
text_align_justify: false

# 在页眉和页脚添加遮罩
mask:
  header: true
  footer: true

# 加载动画
preloader:
  enable: false
  # source
  # 1 = 全屏加载动画 | 2 = 进度条
  source: 1
  pace_css_url:

# 页面转场动画
enter_transitions: true

# 默认显示模式
# light = 亮色（默认） | dark = 暗色
display_mode: light

# 美化文章内容的配置
beautify:
  enable: false
  # 指定美化范围（全站 site 或仅文章 post）
  field: post
  # 指定标题前缀使用的图标
  title_prefix_icon:
  # 指定标题前缀图标的颜色
  title_prefix_icon_color:

# 全局字体设置
# 除非你知道它们如何工作，否则不要修改以下设置
font:
  global_font_size:
  code_font_size:
  font_family:
  code_font_family:

# 网站标题和副标题的字体设置
blog_title_font:
  font_link:
  font_family:

# 分隔符图标设置
hr_icon:
  enable: true
  # Font Awesome 图标的 Unicode 值
  icon:
  icon_top:

# 打字机效果（输入时的特效）
activate_power_mode:
  enable: false
  colorful: true
  shake: true
  mobile: false

# 背景特效
# --------------------------------------

# 彩色丝带背景
canvas_ribbon:
  enable: false
  # 彩带大小
  size: 150
  # 彩带透明度（0 ~ 1）
  alpha: 0.6
  zIndex: -1
  click_to_change: false
  mobile: false

# 飘动彩带
canvas_fluttering_ribbon:
  enable: false
  mobile: false

# 鼠标粒子特效
canvas_nest:
  enable: false
  # 线条颜色，RGB 值，用逗号分隔
  color: '0,0,255'
  # 线条透明度（0 ~ 1）
  opacity: 0.7
  zIndex: -1
  # 线条数量
  count: 99
  mobile: false

# 鼠标点击效果：烟花
fireworks:
  enable: false
  zIndex: 9999
  mobile: false

# 鼠标点击效果：爱心
click_heart:
  enable: false
  mobile: false

# 鼠标点击效果：文字
clickShowText:
  enable: false
  text:
    # - I
    # - LOVE
    # - YOU
  fontSize: 15px
  random: false
  mobile: false

# --------------------------------------
# Lightbox Settings
# 灯箱设置 - 不需要可以不改
# --------------------------------------

# 选择灯箱插件
# fancybox = Fancybox | medium_zoom = Medium Zoom
# 留空表示不使用灯箱
lightbox:

# --------------------------------------
# Tag Plugins settings
# 标签插件设置 - 不需要可以不改
# --------------------------------------

# 系列文章
series:
  enable: false
  # 排序方式
  # title = 按标题 | date = 按日期
  orderBy: 'title'
  # 排序顺序
  # 1 = 升序 | -1 = 降序
  order: 1
  number: true

# ABCJS - 音乐记谱插件
abcjs:
  enable: false
  per_page: true

# Mermaid - 图表插件
mermaid:
  enable: false
  # 使用代码块写 Mermaid 图表
  code_write: false
  # 内置主题
  theme:
    light: default
    dark: dark
  # 启用在新标签页查看图表的按钮
  open_in_new_tab: true
  # 启用图表的缩放和平移交互
  zoom_pan: true

# Chart.js - 图表插件
chartjs:
  enable: false
  # 除非你理解它们如何工作，否则不要修改
  fontColor:
    light: 'rgba(0, 0, 0, 0.8)'
    dark: 'rgba(255, 255, 255, 0.8)'
  borderColor:
    light: 'rgba(0, 0, 0, 0.1)'
    dark: 'rgba(255, 255, 255, 0.2)'
  scale_ticks_backdropColor:
    light: 'transparent'
    dark: 'transparent'

# Note - 提示框标签
note:
  # 提示框样式
  # simple = BS 旧版样式（默认）
  # modern = BS 新版样式
  # flat = 扁平样式（类似 Mozilla 或 StackOverflow）
  # disabled = 禁用所有 note 标签的 CSS 样式
  style: flat
  icons: true
  border_radius: 3
  light_bg_offset: 0

