name: 自动部署到服务器

on:
  push:
    branches:
      - main  # 当推送到 main 分支时触发部署

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 签出代码
      uses: actions/checkout@v4
    
    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: 安装依赖
      run: npm install
    
    - name: 清理并生成静态文件
      run: |
        npx hexo clean
        npx hexo generate
    
    - name: 安装 SSH 密钥
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
    
    - name: 添加服务器到已知主机
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H 70.153.16.253 >> ~/.ssh/known_hosts
    
    - name: 通过 rsync 部署到服务器
      run: |
        rsync -avz --delete --exclude '.git/' --exclude 'node_modules/' public/ ${{ secrets.SSH_USER }}@70.153.16.253:/var/www/blog/
